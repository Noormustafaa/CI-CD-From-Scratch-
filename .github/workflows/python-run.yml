name: Run My Python Script Automatically

on: [push]

jobs:
  run-python-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Python Script
        run: python GitHub_Actions/Script.py
